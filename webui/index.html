<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cene_baglanti review UI</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1>Review UI</h1>
      <button id="refreshCases">Refresh cases</button>
      <div id="caseList" class="case-list"></div>
    </aside>

    <main class="main-panel">
      <section class="viewer-panel">
        <div class="toolbar">
          <label>Interaction
            <select id="selectionMode">
              <option value="place-adapter">place adapter</option>
              <option value="include">include mask</option>
              <option value="exclude">exclude mask</option>
            </select>
          </label>
          <label><input type="checkbox" id="wireframeToggle"> wireframe</label>
          <button id="clearSelection">Clear selection</button>
          <button id="centerFromSelection">Use mask centroid</button>
          <button id="saveSelection">Save selection</button>
        </div>
        <div id="viewer"></div>
      </section>

      <section class="details-panel">
        <div class="panel-grid">
          <div class="card">
            <h2>Case</h2>
            <pre id="caseSummary">No case loaded.</pre>
          </div>
          <div class="card">
            <h2>Selection</h2>
            <pre id="selectionSummary">No selection.</pre>
          </div>
          <div class="card">
            <h2>Adapter Placement</h2>
            <label>Center X <input id="centerX" type="number" step="0.01"></label>
            <label>Center Y <input id="centerY" type="number" step="0.01"></label>
            <label>Center Z <input id="centerZ" type="number" step="0.01"></label>
            <label>Yaw <input id="yawDeg" type="number" step="0.1"></label>
            <label>Pitch <input id="pitchDeg" type="number" step="0.1"></label>
            <label>Roll <input id="rollDeg" type="number" step="0.1"></label>
            <label>Offset <input id="mountOffset" type="number" step="0.1"></label>
            <label>Footprint margin <input id="footprintMargin" type="number" step="0.1"></label>
            <label>Wall thickness <input id="wallThickness" type="number" step="0.1"></label>
            <button id="savePlacement">Save placement</button>
          </div>
          <div class="card">
            <h2>Review</h2>
            <label><input type="checkbox" id="approved"> approved</label>
            <label>Patch radius <input id="patchRadius" type="number" step="0.1"></label>
            <label>Contact offset <input id="contactOffset" type="number" step="0.1"></label>
            <label>Footprint width <input id="footprintWidth" type="number" step="0.1"></label>
            <label>Footprint height <input id="footprintHeight" type="number" step="0.1"></label>
            <label>Saddle height <input id="saddleHeight" type="number" step="0.1"></label>
            <label>Notes <textarea id="reviewNotes" rows="4"></textarea></label>
            <button id="saveReview">Save review</button>
            <button id="regenerate">Regenerate</button>
          </div>
          <div class="card">
            <h2>Compare</h2>
            <pre id="compareSummary">No regeneration yet.</pre>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
